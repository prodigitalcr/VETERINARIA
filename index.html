<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANAAN Vet | Enterprise Medical System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .hidden-section { display: none !important; }
        .sidebar-link { transition: all 0.3s; cursor: pointer; border-radius: 12px; }
        .sidebar-link:hover, .active-nav { background: #2563eb; color: white; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4); }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- ==========================================
         LANDING PAGE VETERINARIA PRO
         ========================================== -->
    <div id="view-landing" class="relative">
        <nav class="fixed w-full z-50 bg-white/80 backdrop-blur-md px-12 py-4 flex justify-between items-center border-b">
            <div class="flex items-center gap-2">
                <i class="fas fa-heart-pulse text-blue-600 text-2xl"></i>
                <span class="text-2xl font-black italic">CANAAN <span class="text-blue-600">VET</span></span>
            </div>
            <button onclick="toggleModal('modal-auth')" class="bg-slate-900 text-white px-8 py-3 rounded-2xl font-bold hover:bg-blue-600 transition">Portal Clínico</button>
        </nav>

        <section class="pt-48 pb-20 px-12 bg-gradient-to-b from-blue-50 to-white">
            <div class="container mx-auto grid md:grid-cols-2 gap-12 items-center">
                <div class="space-y-6">
                    <h1 class="text-7xl font-black leading-tight tracking-tighter">Hospital <span class="text-blue-600">Especializado</span> de Alta Complejidad.</h1>
                    <p class="text-xl text-slate-500">Más de 10 servicios médicos avanzados con expediente digital y comunicación directa con su especialista.</p>
                    <div class="flex gap-4">
                        <button onclick="toggleModal('modal-auth')" class="bg-blue-600 text-white px-10 py-5 rounded-3xl font-black text-xl shadow-2xl hover:scale-105 transition">AGENDAR CITA AHORA</button>
                    </div>
                </div>
                <img src="https://images.unsplash.com/photo-1576201836106-db1758fd1c97?auto=format&fit=crop&q=80&w=800" class="rounded-[4rem] shadow-2xl border-[15px] border-white">
            </div>
        </section>
    </div>

    <!-- ==========================================
         SISTEMA ADMIN / MÉDICO / JEFE
         ========================================== -->
    <div id="view-system" class="hidden-section flex min-h-screen">
        <!-- Sidebar Dinámico -->
        <aside class="w-80 bg-slate-900 text-slate-400 p-8 flex flex-col fixed h-full shadow-2xl">
            <div class="mb-12 flex items-center gap-2 text-white">
                <i class="fas fa-microscope text-blue-500"></i>
                <span class="text-xl font-black italic uppercase">CANAAN <span class="text-blue-500 text-sm">OS</span></span>
            </div>
            <nav id="sidebar-nav" class="flex-1 space-y-2">
                <!-- Se llena por JS según el rol -->
            </nav>
            <div class="mt-auto pt-8 border-t border-slate-800">
                <button onclick="location.reload()" class="text-red-400 font-bold hover:text-red-200"><i class="fas fa-sign-out-alt mr-2"></i> Salir del Sistema</button>
            </div>
        </aside>

        <!-- Contenedor de Ventanas -->
        <main class="flex-1 ml-80 p-12 overflow-y-auto h-screen">
            <header class="flex justify-between items-center mb-12">
                <h2 id="window-title" class="text-4xl font-black italic">Dashboard Principal</h2>
                <div id="user-badge" class="flex items-center gap-4 bg-white p-3 px-6 rounded-2xl border shadow-sm">
                    <div class="text-right">
                        <p id="profile-display-name" class="font-black text-sm uppercase">Cargando...</p>
                        <p id="profile-role" class="text-[10px] text-blue-600 font-bold uppercase tracking-widest"></p>
                    </div>
                    <img src="https://i.pravatar.cc/100" class="w-10 h-10 rounded-full border-2 border-blue-600">
                </div>
            </header>

            <div id="content-area">
                <!-- El contenido de las ventanas se inyecta aquí -->
            </div>
        </main>
    </div>

    <!-- ==========================================
         MODALES Y LOGICA
         ========================================== -->
    <div id="modal-auth" class="fixed inset-0 z-[100] hidden bg-slate-900/90 backdrop-blur-md flex items-center justify-center p-6">
        <div class="bg-white rounded-[3rem] p-12 max-w-md w-full">
            <h2 class="text-3xl font-black text-center mb-8 uppercase italic">Acceso <span class="text-blue-600">Canaan</span></h2>
            <div class="space-y-4">
                <input type="email" id="input-user" placeholder="Correo (ej: jefe@canaan.com)" class="w-full bg-slate-100 p-5 rounded-2xl outline-none border-2 focus:border-blue-600 font-bold">
                <input type="password" id="input-pass" placeholder="Contraseña" class="w-full bg-slate-100 p-5 rounded-2xl outline-none border-2 focus:border-blue-600 font-bold">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl">INGRESAR</button>
                <button onclick="toggleModal('modal-auth')" class="w-full text-slate-400 font-bold text-sm">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;

        const ROLES = {
            JEFE: 'JEFE',
            MEDICO: 'MEDICO',
            CLIENTE: 'CLIENTE'
        };

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }

        function handleLogin() {
            const user = document.getElementById('input-user').value;
            const pass = document.getElementById('input-pass').value;

            if(user === 'jefe@canaan.com' && pass === 'MasterAdmin2026') currentUser = { role: ROLES.JEFE, name: 'Administrador Jefe' };
            else if(user === 'medico1@canaan.com' && pass === 'VetCanaan01') currentUser = { role: ROLES.MEDICO, name: 'Dr. Roberto Vargas' };
            else if(user === 'cliente@mascota.com' && pass === 'Mascota2026') currentUser = { role: ROLES.CLIENTE, name: 'Juan Perez' };
            else return alert("Datos incorrectos");

            document.getElementById('view-landing').classList.add('hidden-section');
            document.getElementById('view-system').classList.remove('hidden-section');
            toggleModal('modal-auth');
            initSystem();
        }

        function initSystem() {
            document.getElementById('profile-display-name').innerText = currentUser.name;
            document.getElementById('profile-role').innerText = currentUser.role;
            renderSidebar();
            loadWindow('dashboard');
        }

        function renderSidebar() {
            const nav = document.getElementById('sidebar-nav');
            let links = [];

            if(currentUser.role === ROLES.JEFE) {
                links = [
                    { id: 'dashboard', icon: 'fa-chart-line', label: 'Dashboard General' },
                    { id: 'rendimiento', icon: 'fa-user-tie', label: 'Rendimiento Médicos' },
                    { id: 'proveedores', icon: 'fa-truck-ramp-box', label: 'Proveedores' },
                    { id: 'pagos', icon: 'fa-file-invoice-dollar', label: 'Arreglos de Pago' },
                    { id: 'envios', icon: 'fa-paper-plane', label: 'Envíos Logística' },
                    { id: 'perfil', icon: 'fa-user-gear', label: 'Mi Perfil' }
                ];
            } else if(currentUser.role === ROLES.MEDICO) {
                links = [
                    { id: 'citas', icon: 'fa-calendar-day', label: 'Citas del Día' },
                    { id: 'pacientes', icon: 'fa-paw', label: 'Mis Pacientes' },
                    { id: 'intervenciones', icon: 'fa-notes-medical', label: 'Historial Intervenciones' },
                    { id: 'perfil', icon: 'fa-user-gear', label: 'Mi Perfil' }
                ];
            } else {
                links = [
                    { id: 'mascota', icon: 'fa-dog', label: 'Mi Mascota' },
                    { id: 'agendar', icon: 'fa-calendar-plus', label: 'Reservar Cita' },
                    { id: 'historial', icon: 'fa-book-medical', label: 'Mis Observaciones' },
                    { id: 'perfil', icon: 'fa-user-gear', label: 'Mi Perfil' }
                ];
            }

            nav.innerHTML = links.map(link => `
                <div onclick="loadWindow('${link.id}')" class="sidebar-link p-4 flex items-center gap-4 font-bold">
                    <i class="fas ${link.icon} w-6"></i> ${link.label}
                </div>
            `).join('');
        }

        function loadWindow(id) {
            const content = document.getElementById('content-area');
            const title = document.getElementById('window-title');
            
            let html = '';
            
            switch(id) {
                case 'dashboard':
                    title.innerText = "Dashboard General";
                    html = `
                        <div class="grid grid-cols-3 gap-6">
                            <div class="bg-white p-8 rounded-3xl border shadow-sm">
                                <p class="text-xs font-black text-slate-400 uppercase">Caja del Día</p>
                                <p class="text-3xl font-black text-blue-600">₡975,000</p>
                            </div>
                            <div class="bg-white p-8 rounded-3xl border shadow-sm">
                                <p class="text-xs font-black text-slate-400 uppercase">Citas Completadas</p>
                                <p class="text-3xl font-black">12/15</p>
                            </div>
                            <div class="bg-white p-8 rounded-3xl border shadow-sm">
                                <p class="text-xs font-black text-slate-400 uppercase">Pacientes en Observación</p>
                                <p class="text-3xl font-black text-amber-600">4</p>
                            </div>
                        </div>
                    `;
                    break;
                case 'rendimiento':
                    title.innerText = "Rendimiento de Empleados";
                    html = `
                        <div class="bg-white rounded-3xl border overflow-hidden">
                            <table class="w-full text-left">
                                <thead class="bg-slate-50 text-xs font-black uppercase">
                                    <tr><th class="p-6">Médico</th><th class="p-6">Citas Mes</th><th class="p-6">Facturación</th><th class="p-6">Rating</th></tr>
                                </thead>
                                <tbody>
                                    <tr class="border-t">
                                        <td class="p-6 font-bold">Dr. Roberto Vargas</td>
                                        <td class="p-6">45</td>
                                        <td class="p-6 text-blue-600 font-bold">₡1.2M</td>
                                        <td class="p-6 text-amber-500">★★★★★</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    `;
                    break;
                case 'pacientes':
                case 'intervenciones':
                    title.innerText = "Historial Clínico";
                    html = `
                        <div class="bg-white p-8 rounded-3xl border">
                            <div class="flex justify-between items-center mb-8">
                                <h3 class="text-xl font-bold italic">Paciente: MAX (Golden Retriever)</h3>
                                <button onclick="exportToPDF()" class="bg-red-600 text-white px-6 py-2 rounded-xl font-bold">Exportar PDF</button>
                            </div>
                            <div class="space-y-4">
                                <div class="p-4 bg-slate-50 rounded-xl border">
                                    <p class="font-black">02/05/2026 - Cirugía Dental</p>
                                    <p class="text-sm">Observación: Limpieza profunda realizada sin complicaciones. Sedación exitosa.</p>
                                </div>
                            </div>
                        </div>
                    `;
                    break;
                case 'agendar':
                    title.innerText = "Reservar Cita Médica";
                    html = `
                        <div class="bg-white p-12 rounded-[3rem] border shadow-2xl max-w-2xl mx-auto">
                            <div class="space-y-6">
                                <div>
                                    <label class="text-xs font-black uppercase text-slate-400">Seleccionar Médico</label>
                                    <select class="w-full p-4 mt-2 bg-slate-100 rounded-2xl outline-none font-bold">
                                        <option>Dr. Roberto Vargas (Cirugía)</option>
                                        <option>Dra. Maria Elena (Dermatología)</option>
                                    </select>
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <input type="date" class="p-4 bg-slate-100 rounded-2xl font-bold outline-none border-2 focus:border-blue-600">
                                    <input type="time" class="p-4 bg-slate-100 rounded-2xl font-bold outline-none border-2 focus:border-blue-600">
                                </div>
                                <div class="p-6 bg-blue-50 rounded-2xl border border-blue-200">
                                    <p class="text-sm font-bold text-blue-800 italic">Monto a pagar para agendar: ₡15,000[cite: 1]</p>
                                    <p class="text-[10px] uppercase font-black text-blue-400 mt-2 italic">Método: SINPE Móvil al 8888-8888</p>
                                </div>
                                <button class="w-full bg-blue-600 text-white py-5 rounded-3xl font-black text-xl shadow-xl">RESERVAR MI ESPACIO</button>
                            </div>
                        </div>
                    `;
                    break;
                case 'perfil':
                    title.innerText = "Configuración de Mi Perfil";
                    html = `
                        <div class="bg-white p-12 rounded-[3rem] border shadow-sm max-w-xl">
                            <div class="space-y-6">
                                <div><label class="text-xs font-black text-slate-400 uppercase">Nombre Completo</label>
                                <input type="text" value="${currentUser.name}" class="w-full p-4 bg-slate-50 rounded-xl mt-2 font-bold outline-none border-2 focus:border-blue-600"></div>
                                <div><label class="text-xs font-black text-slate-400 uppercase">Cambiar Contraseña</label>
                                <input type="password" placeholder="Nueva Contraseña" class="w-full p-4 bg-slate-50 rounded-xl mt-2 font-bold outline-none border-2 focus:border-blue-600"></div>
                                <button class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-black">GUARDAR CAMBIOS</button>
                            </div>
                        </div>
                    `;
                    break;
            }
            content.innerHTML = html;
        }

        function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFont("helvetica", "bold");
            doc.text("HISTORIAL CLÍNICO CANAAN VET", 20, 20);
            doc.setFontSize(10);
            doc.text("Paciente: MAX | Médico: Dr. Roberto Vargas", 20, 30);
            doc.text("--------------------------------------------------", 20, 35);
            doc.text("Resumen: Cirugía de limpieza dental y extracción.", 20, 45);
            doc.save("Expediente_MAX.pdf");
            alert("PDF Generado con éxito");
        }
    </script>
</body>
</html>
